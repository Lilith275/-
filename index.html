<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>系统逻辑演算 v2.1.0 - Tease Edition</title>
    <style>
        :root {
            --primary: #4a90e2;
            --danger: #ff0033;
            --glass: rgba(255, 255, 255, 0.8);
            --bg: #f0f2f5;
        }

        * { transition: all 0.6s cubic-bezier(0.2, 1, 0.3, 1); box-sizing: border-box; }

        html, body {
            margin: 0; padding: 0;
            width: 100vw; height: 100vh;
            overflow: hidden;
            background-color: var(--bg);
        }

        body {
            display: flex; justify-content: center; align-items: center;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            touch-action: manipulation;
        }

        /* 1. 真正的全屏干扰层 */
        #subliminal {
            position: fixed; top: 0; left: 0; 
            width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(8px);
            color: var(--danger);
            display: flex; justify-content: center; align-items: center;
            z-index: 9999; font-size: 1.8rem; font-weight: bold;
            opacity: 0; pointer-events: none;
            transition: opacity 0.1s ease;
        }

        /* 2. 伪造的 alert 弹窗样式 (拒绝羞耻网址) */
        #fakeAlert {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            background: #fff; width: 280px;
            padding: 25px; border-radius: 15px;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            text-align: center; z-index: 10001;
            opacity: 0; pointer-events: none;
            display: block;
        }
        #fakeAlert.show { opacity: 1; transform: translate(-50%, -50%) scale(1); pointer-events: auto; }
        #fakeAlert p { color: #333; font-size: 1.1rem; margin-bottom: 20px; font-weight: bold; }
        #fakeAlert button { background: #333; color: #fff; border: none; padding: 8px 30px; border-radius: 20px; cursor: pointer; }

        .card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 40px 20px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            width: 90%; max-width: 360px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.3);
            z-index: 100;
            position: relative;
        }

        h2 { font-weight: 300; letter-spacing: 2px; color: #555; margin-bottom: 10px; }
        .sub-text { font-size: 12px; color: #999; margin-bottom: 30px; }

        #inputWrapper { display: block; position: relative; transition: all 0.7s cubic-bezier(0.68, -0.55, 0.27, 1.55); }

        input {
            width: 100%; padding: 12px;
            border: none; border-bottom: 2px solid #eee;
            background: transparent; text-align: center;
            font-size: 1.5rem; outline: none; margin-bottom: 20px;
            color: #333; border-radius: 0;
        }

        button.exec-btn {
            background: #333; color: white; border: none;
            padding: 12px 40px; border-radius: 30px;
            cursor: pointer; letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .corrupted { background-color: #000 !important; }
        
        .card-break {
            background: rgba(0, 0, 0, 0.98) !important;
            border-color: var(--danger) !important;
            box-shadow: 0 0 60px rgba(255,0,0,0.4) !important;
        }

        .shake-heavy { animation: shake-heavy 0.2s infinite alternate ease-in-out; }
        @keyframes shake-heavy {
            from { transform: translate(-5px, -3px); }
            to { transform: translate(5px, 3px); }
        }

        .input-escaped { transform: translateY(-100vh) scale(0.3) !important; opacity: 0 !important; }

        .pop-insane {
            position: fixed; z-index: 9998; 
            background: #000; color: var(--danger);
            border-left: 5px solid var(--danger); padding: 10px 20px;
            font-weight: 900; white-space: nowrap;
            box-shadow: 10px 10px 0 rgba(0,0,0,0.5);
            animation: glitch 0.3s infinite;
        }
        @keyframes glitch { 0% { transform: skewX(0deg); } 50% { transform: skewX(-10deg); } 100% { transform: skewX(0deg); } }
    </style>
</head>
<body>

<div id="subliminal">月寒，我一直在看着你</div>

<div id="fakeAlert">
    <p id="fakeAlertMsg">提示</p>
    <button onclick="closeFakeAlert()">确定</button>
</div>

<div class="card" id="mainCard">
    <h2 id="mainTitle">Logic System</h2>
    <div class="sub-text" id="subLabel">Encryption Level: Standard</div>
    
    <div id="inputWrapper">
        <input type="number" id="guessInput" placeholder="??">
    </div>
    
    <br>
    <button class="exec-btn" onclick="check()">EXECUTE</button>
    <div id="msg">请输入 1-100 的校验码</div>
</div>

<script>
let target = Math.floor(Math.random() * 100) + 1; 
let closeAttempts = 0; 
let isInputEscaped = false; 
let isAwakened = false; 

const psychoTexts = ["月寒，盯着我看。", "你的心跳，我听到了。", "为什么想逃？", "这里只有我们。", "月寒...月寒...月寒...", "别动那个按钮。", "你是我的。", "嘘，别出声。"];

// 弹窗队列控制
let alertQueue = [];
function customAlert(text) {
    alertQueue.push(text);
    if (alertQueue.length === 1) showNextAlert();
}

function showNextAlert() {
    if (alertQueue.length === 0) return;
    document.getElementById('fakeAlertMsg').innerText = alertQueue[0];
    document.getElementById('fakeAlert').classList.add('show');
}

function closeFakeAlert() {
    document.getElementById('fakeAlert').classList.remove('show');
    alertQueue.shift();
    setTimeout(showNextAlert, 300); // 间隔一点时间显示下一个
}

function check() {
    const input = document.getElementById('guessInput');
    const wrapper = document.getElementById('inputWrapper');
    const card = document.getElementById('mainCard');
    const msg = document.getElementById('msg');
    const title = document.getElementById('mainTitle');
    const subLayer = document.getElementById('subliminal');
    const val = parseInt(input.value);

    if (isInputEscaped) { triggerInsanity(); return; }
    if (isNaN(val)) return;

    if (Math.random() < 0.05) {
        subLayer.style.opacity = '1';
        setTimeout(() => { subLayer.style.opacity = '0'; }, 150);
    }

    if (!isAwakened) {
        if (val === target) {
            isAwakened = true;
            msg.innerText = "System: Analysing Entropy...";
            setTimeout(() => {
                title.innerText = "FOUND YOU";
                title.style.color = "red";
                document.getElementById('subLabel').innerText = "IDENTIFIED: YUE HAN";
                msg.innerText = "“玩的开心吗，月寒？”";
                target = Math.floor(Math.random() * 100) + 1; 
            }, 1000);
        } else {
            msg.innerText = val > target ? "反馈：你猜得太大了。" : "反馈：你猜得太小了。";
        }
    } else {
        let diff = Math.abs(val - target);
        if (val === target) {
            triggerInsanity();
        } else if (diff <= 5) {
            document.body.classList.add('corrupted');
            card.classList.add('shake-heavy');
            msg.style.color = "red";
            msg.innerText = "“离我的心太近了...月寒。”";
            closeAttempts++;
            if (closeAttempts >= 3) {
                isInputEscaped = true;
                wrapper.classList.add('input-escaped');
                msg.innerText = "“哎呀，输入框不见了...这样你就能多看看我了。”";
            }
        } else {
            document.body.classList.remove('corrupted');
            card.classList.remove('shake-heavy');
            msg.style.color = "#777";
            msg.innerText = val > target ? "反馈：你猜得太大了。" : "反馈：你猜得太小了。";
        }
    }
    input.value = '';
}

function triggerInsanity() {
    const card = document.getElementById('mainCard');
    document.body.classList.add('corrupted');
    card.classList.add('card-break', 'shake-heavy');
    document.getElementById('mainTitle').innerText = "抓到你了";
    
    // 使用自定义弹窗替换 alert
    customAlert("抓到你了。");
    customAlert("月寒。");

    let count = 0;
    let timer = setInterval(() => {
        const div = document.createElement('div');
        div.className = 'pop-insane';
        div.style.top = Math.random() * 90 + 'vh';
        div.style.left = Math.random() * 70 + 'vw';
        div.innerText = psychoTexts[Math.floor(Math.random() * psychoTexts.length)];
        document.body.appendChild(div);
        if (++count > 50) { clearInterval(timer); setTimeout(resetAll, 3000); }
    }, 80);
}

function resetAll() {
    document.querySelectorAll('.pop-insane').forEach(e => e.remove());
    const card = document.getElementById('mainCard');
    const wrapper = document.getElementById('inputWrapper');
    document.body.classList.remove('corrupted');
    card.classList.remove('card-break', 'shake-heavy');
    wrapper.classList.remove('input-escaped'); 
    document.getElementById('mainTitle').innerText = "Logic System";
    document.getElementById('mainTitle').style.color = "#555";
    document.getElementById('subLabel').innerText = "Encryption Level: Standard";
    document.getElementById('msg').innerText = "“系统重启完成。继续吧，月寒。”";
    target = Math.floor(Math.random() * 100) + 1; 
    closeAttempts = 0;
    isInputEscaped = false;
    isAwakened = false;
    alertQueue = []; // 清空弹窗队列
    document.getElementById('fakeAlert').classList.remove('show');
}
</script>
</body>
</html>
